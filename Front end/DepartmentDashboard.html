<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Department Dashboard</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="HomePage.html">
          <img
            src="img/OIP.webp"
            alt="Logo"
            width="40"
            height="40"
            class="me-2 rounded-circle"
          />
          <span>Admin Panel</span>
        </a>
        <div class="collapse navbar-collapse" id="siteNavbar">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0 d-flex flex-row">
            <li class="nav-item">
              <a class="nav-link active" href="HomePage.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="LoginPage.html">Logout</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container-fluid mt-3">
      <div class="d-flex justify-content-between align-items-center flex-wrap mb-3">
        <div>
          <h4 id="departmentHeader" class="mb-0">Department Dashboard</h4>
          <small id="departmentSubtitle" class="text-muted">Showing only department-specific complaints.</small>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center gap-2 flex-wrap mb-3">
        <div class="d-flex align-items-center gap-2 flex-wrap">
          <i class="bi bi-funnel-fill text-secondary"></i>

          <select class="form-select form-select-sm w-auto" id="filterDistrict" onchange="loadComplaints()">
            <option value="">Select District</option>
            <option value="Chennai">Chennai</option>
            <option value="Madurai">Madurai</option>
            <option value="Coimbatore">Coimbatore</option>
          </select>

          <select class="form-select form-select-sm w-auto" id="filterStatus" onchange="loadComplaints()">
            <option value="">Select Status</option>
            <option value="Pending">Pending</option>
            <option value="Inprogress">Inprogress</option>
            <option value="Completed">Completed</option>
          </select>

          <div class="input-group input-group-sm" style="width: 250px">
            <span class="input-group-text bg-white">
              <i class="bi bi-search"></i>
            </span>
            <input
              type="text"
              class="form-control"
              placeholder="Search Complaint"
              id="searchComplaint"
              onkeyup="loadComplaints()"
            />
          </div>

          <button class="btn btn-secondary btn-sm" onclick="clearFilters()">
            Clear Filter
          </button>
        </div>
      </div>
    </div>

    <div class="container-fluid px-0">
      <table class="table table-bordered table-hover text-center">
        <thead class="table-dark">
          <tr>
            <th>S.No</th>
            <th>Complaint ID</th>
            <th>Complaint Description</th>
            <th>District</th>
            <th>Department</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="complaintTableBody"></tbody>
      </table>
    </div>

    <script>
      const departmentName = new URLSearchParams(window.location.search).get('department') || '';

      function clearFilters() {
        document.getElementById('filterDistrict').selectedIndex = 0;
        document.getElementById('filterStatus').selectedIndex = 0;
        document.getElementById('searchComplaint').value = '';
        loadComplaints();
      }

      function handleStatusChange(select) {
        console.log('Changed to:', select.value, 'id:', select.dataset.id);
        updateComplaintStatus(select.dataset.id, select.value);
      }

      async function updateComplaintStatus(complaintId, newStatus) {
        try {
          await fetch(`http://localhost:5000/complaints/${complaintId}/status`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: newStatus }),
          });
          loadComplaints();
        } catch (error) {
          console.error('Status update failed', error);
          alert('Unable to update status');
        }
      }

      async function loadComplaints() {
        const district = document.getElementById('filterDistrict').value;
        const status = document.getElementById('filterStatus').value;
        const search = document.getElementById('searchComplaint').value;

        const response = await fetch(
          `http://localhost:5000/complaints?district=${encodeURIComponent(district)}&department=${encodeURIComponent(departmentName)}&status=${encodeURIComponent(status)}&search=${encodeURIComponent(search)}`
        );

        const data = await response.json();
        let table = '';

        data.forEach((item, index) => {
          const selectedPending = item.status === 'Pending' ? 'selected' : '';
          const selectedInprogress = item.status === 'Inprogress' ? 'selected' : '';
          const selectedCompleted = item.status === 'Completed' ? 'selected' : '';

          table += `
            <tr>
              <td>${index + 1}</td>
              <td>${item.complaint_id}</td>
              <td>${item.complaint_desc}</td>
              <td>${item.district}</td>
              <td>${item.department}</td>
              <td>
                <select class="form-select status-select" data-id="${item.id}" onchange="handleStatusChange(this)" style="min-width: 160px; pointer-events: auto; z-index: 1;">
                  <option value="Pending" ${selectedPending}>Pending</option>
                  <option value="Inprogress" ${selectedInprogress}>Inprogress</option>
                  <option value="Completed" ${selectedCompleted}>Completed</option>
                </select>
              </td>
            </tr>
          `;
        });

        document.getElementById('complaintTableBody').innerHTML = table;
        document.querySelectorAll('.status-select').forEach(select => {
          select.addEventListener('change', event => {
            const complaintId = event.target.dataset.id;
            const newStatus = event.target.value;
            updateComplaintStatus(complaintId, newStatus);
          });
        });
      }

      document.addEventListener('DOMContentLoaded', () => {
        if (!departmentName) {
          alert('No department selected. Please login again.');
          window.location.href = 'DepartmentLogin.html';
          return;
        }

        document.getElementById('departmentHeader').innerText = `${departmentName} Department Dashboard`;
        document.getElementById('departmentSubtitle').innerText = `Showing only ${departmentName} complaints.`;
        loadComplaints();
      });
    </script>
  </body>
</html>
