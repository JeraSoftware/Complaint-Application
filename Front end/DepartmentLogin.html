<!doctype html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Department Login</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" href="HomePage.html">
      <img src="img/OIP.webp" alt="Logo" width="40" height="40" class="me-2 rounded-circle">
      <span>Admin Panel</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#siteNavbar" aria-controls="siteNavbar" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="siteNavbar">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="HomePage.html">Home</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container">

  <div
    class="d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4 shadow"
         style="width:400px;">

      <h3 class="text-center mb-4">

        Department Login

      </h3>

      <div class="mb-3">

        <label class="form-label">

          Department

        </label>

        <select id="department" class="form-select">

          <option value="">Select Department</option>

          <option value="Police">Police</option>

          <option value="Transport">Transport</option>

          <option>Health</option>

        </select>

      </div>

      <div class="mb-3">

        <label class="form-label">

          Username

        </label>

        <input
          id="departmentUsername"
          type="text"
          class="form-control">

      </div>

      <div class="mb-3">

        <label class="form-label">

          Password

        </label>

        <input
          id="departmentPassword"
          type="password"
          class="form-control">

      </div>

      <button
        class="btn btn-primary"
        onclick="departmentLogin()">

        Login

      </button>

    </div>

  </div>

</div>

<script>

function departmentLogin(){
  const department = document.getElementById('department').value;
  const username = document.getElementById('departmentUsername').value.trim();
  const password = document.getElementById('departmentPassword').value.trim();

  if (!department || !username || !password) {
    alert('Please select department and enter credentials.');
    return;
  }

  fetch('http://localhost:8080/api/departments/login', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      department: department,
      username: username,
      password: password
    })
  })
  .then(res => {
    if (!res.ok) {
      return res.text().then(text => { throw new Error(text || 'Invalid credentials'); });
    }
    return res.text();
  })
  .then(() => {
    alert('Department Login Successful');
    window.location.href = `DepartmentDashboard.html?department=${encodeURIComponent(department)}`;
  })
  .catch(err => {
    alert(err.message || 'Access denied');
  });
}

</script>

</body>
</html>
