<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login Page</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <style>
      body {
        margin: 0;

        padding: 0;
      }

      .main-section {
        height: 100vh;

        background-image: url("background.jpg");

        background-size: cover;

        background-position: center;

        background-repeat: no-repeat;
      }

      .login-container {
        height: 100vh;

        display: flex;

        justify-content: center;

        align-items: center;
      }

      .login-card {
        width: 400px;

        background: rgba(255, 255, 255, 0.95);

        padding: 35px;

        border-radius: 15px;

        box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
      }

      .login-title {
        text-align: center;

        margin-bottom: 25px;

        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="HomePage.html">
          <img src="img/OIP.webp" alt="Logo" width="40" height="40" class="me-2 rounded-circle">
          <span>Admin Panel</span>
        </a>
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 d-flex flex-row">
          <li class="nav-item">
            <a class="nav-link active" href="HomePage.html">Home</a>
          </li>
        </ul>
      </div>
    </nav>
    <!-- Main Section -->

    <section class="main-section">
      <div class="login-container">
        <!-- Login Card -->

        <div class="login-card text-center">
          <img src="img/OIP.webp" alt="Logo" width="80" height="80" class="mb-3 rounded-circle shadow-sm">
          <h2 class="login-title">
            <i class="bi bi-person-circle"></i>

            Login
          </h2>

          <!-- User Type -->

          <div class="mb-3">
            <label class="form-label"> Login As </label>

            <select
              class="form-select"
              id="userType"
              onchange="showDepartment()"
            >
              <option value="">Select User</option>

              <option value="Customer">Customer</option>

              <option value="Department">Department</option>

              <option value="Admin">Admin</option>
            </select>
          </div>

          <div class="d-grid" id="loginButtonDiv" style="display: none">
            <button class="btn btn-primary" onclick="loginUser()">
              <i class="bi bi-box-arrow-in-right"></i>

              Continue
            </button>
          </div>
        </div>
      </div>
    </section>


    <script>

function loginUser(){

  let userType =
    document.getElementById("userType").value;

  if(userType === ""){

    alert("Please Select User Type");

    return;

  }

  if(userType === "Customer"){

    window.location.href =
      "CustomerLogin.html";

  }

  else if(userType === "Department"){

    window.location.href =
      "DepartmentLogin.html";

  }

  else if(userType === "Admin"){

    window.location.href =
      "AdminLogin.html";

  }

}

</script>
  </body>
</html>
