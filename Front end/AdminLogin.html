<!doctype html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Admin Login</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

  <div
    class="d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4 shadow"
         style="width:400px;">

<div class="container text-center mt-5">
  <img src="img/OIP.webp" alt="Admin Logo" width="80" height="80" class="mb-3 rounded-circle shadow-sm">
  <h1 class="h3 mb-4">Admin Login Page</h1>
</div>

      <div class="mb-3">

        <label class="form-label">

          Username

        </label>

        <input
          type="text"
          class="form-control">

      </div>

      <div class="mb-3">

        <label class="form-label">

          Password

        </label>

        <input
          type="password"
          class="form-control">

      </div>

      <button
        class="btn btn-primary"
        onclick="adminLogin()">

        Login

      </button>

    </div>

  </div>

</div>

<script>

function adminLogin(){

  alert("Admin Login Successful");

  window.location.href =
    "AdminDashboard.html";

}

</script>

</body>
</html>
