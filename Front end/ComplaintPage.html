<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Simple Home Page</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="HomePage.html">
          <img src="img/OIP.webp" alt="Logo" width="40" height="40" class="me-2 rounded-circle">
          <span>Admin Panel</span>
        </a>
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 d-flex flex-row">
          <li class="nav-item">
            <a class="nav-link active" href="HomePage.html">Home</a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- Top Section -->
    <div class="container-fluid mt-3">
      <div
        class="d-flex justify-content-between align-items-center flex-wrap mb-3"
      >
        <!-- Left Side Filters -->
        <div class="d-flex align-items-center gap-2 flex-wrap">
          <i class="bi bi-funnel-fill text-secondary"></i>

          <!-- District -->
          <select
            class="form-select form-select-sm w-auto"
            id="filterDistrict"
            onchange="loadComplaints()"
          >
            <option>Select District</option>
            <option>Chennai</option>
            <option>Madurai</option>
            <option>Coimbatore</option>
          </select>

          <!-- Department -->
          <select
            class="form-select form-select-sm w-auto"
            id="filterDepartment"
            onchange="loadComplaints()"
          >
            <option>Select Department</option>
            <option>Police</option>
            <option>Transport</option>
            <option>Health</option>
          </select>

          <!-- Search -->
          <div class="input-group input-group-sm" style="width: 250px">
            <span class="input-group-text bg-white">
              <i class="bi bi-search"></i>
            </span>

            <input
              type="text"
              class="form-control"
              placeholder="Search Complaint"
              id="searchComplaint"
              onkeyup="loadComplaints()"
            />
          </div>
           <!-- Clear Button -->
  <button
    class="btn btn-secondary btn-sm"
    onclick="clearFilters()"
  >
    Clear Filter
  </button>
        </div>

        <!-- Right Side Button -->
        <div>
          <button
  class="btn btn-primary btn-sm"
  data-bs-toggle="modal"
  data-bs-target="#complaintModal"
  onclick="openComplaintForm()"
>
  <i class="bi bi-plus-circle"></i>
  Create Complaint
</button>
        </div>
      </div>
    </div>

    <!-- Complaint Popup Modal -->
    <div class="modal fade" id="complaintModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <!-- Header -->
          <div class="modal-header">
            <h5 class="modal-title">Create Complaint</h5>

            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <!-- Body -->
          <div class="modal-body">
            <div class="row g-3">
              <!-- Complaint ID -->

              <div class="col-md-6">
                <label class="form-label"> Complaint ID </label>

                <input
                  type="text"
                  class="form-control"
                  id="complaintId"
                  readonly
                />
              </div>

              <!-- Complaint Description -->
              <div class="col-md-6">
                <label class="form-label"> Complaint Description </label>

                <input type="text" class="form-control" id="complaintDesc" />
              </div>

              <!-- District -->
              <div class="col-md-6">
                <label class="form-label"> District </label>

                <select
                  class="form-select form-select-sm w-auto"
                  id="district"
                 
                >
                  <option value="">Select District</option>

                  <option value="chennai">Chennai</option>

                  <option value="madurai">Madurai</option>

                  <option value="Coimbatore">Coimbatore</option>
                </select>
              </div>

              <!-- Department -->
              <div class="col-md-6">
                <label class="form-label"> Department </label>

                <select
                  class="form-select form-select-sm w-auto"
                  id="department"
                  
                >
                  <option value="">Select Department</option>

                  <option value="police">Police</option>

                  <option value="Transport">Transport</option>

                  <option value="Health">Health</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Footer -->
          <div class="modal-footer">
            <button class="btn btn-success" onclick="addComplaint()">
              Submit
            </button>
          </div>
        </div>
      </div>
    </div>

    <table class="table table-bordered table-hover text-center">
      <!-- Table Heading -->
      <thead class="table-dark">
        <tr>
          <th>S.No</th>

          <th>Complaint ID</th>

          <th>Complaint Description</th>

          <th>District</th>

          <th>Department</th>

          <th>Status</th>

          <th>Action</th>
        </tr>
      </thead>

      <!-- Table Body -->
      <tbody id="complaintTableBody">
        <tr>
          <td>1</td>

          <td>CMP001</td>

          <td>Road Damage</td>

          <td>Chennai</td>

          <td>Transport</td>

          <td>Assigned</td>

          <td>
            <!-- Three Dot Menu -->
            <div class="dropdown">
              <button
                class="btn btn-light btn-sm"
                type="button"
                data-bs-toggle="dropdown"
              >
                <i class="bi bi-three-dots-vertical"></i>
              </button>

              <!-- Dropdown Menu -->
              <ul class="dropdown-menu">
                <!-- History -->
                <li>
                  <button
                    class="dropdown-item"
                    data-bs-toggle="modal"
                    data-bs-target="#historyModal"
                  >
                    View History
                  </button>
                </li>
              </ul>
            </div>
          </td>
        </tr>
      </tbody>
    </table>

    <!-- java script -->

    <script>
      let serialNo = 2;


      function openComplaintForm() {

  /* Clear Old Values */

  document.getElementById("complaintId").value = "";

  document.getElementById("complaintDesc").value = "";

  document.getElementById("district").selectedIndex = 0;

  document.getElementById("department").selectedIndex = 0;

  /* Generate New Complaint ID */

  generateComplaintId();

}

function clearFilters() {

  document.getElementById("filterDistrict").selectedIndex = 0;

  document.getElementById("filterDepartment").selectedIndex = 0;

  document.getElementById("searchComplaint").value = "";

  loadComplaints();

}

      async function generateComplaintId() {
        try {
          let response = await fetch(
            "http://localhost:5000/getNextComplaintId",
          );

          let data = await response.json();

          document.getElementById("complaintId").value = data.complaintId;
        } catch (error) {
          console.log(error);
        }
      }

      async function addComplaint() {

  let complaintDesc =
    document.getElementById("complaintDesc").value.trim();

  let district =
    document.getElementById("district").value;

  let department =
    document.getElementById("department").value;

  /* Validation */

  if (complaintDesc === "") {

    alert("Complaint Description is required");

    return;
  }

  if (district === "") {

    alert("Please select District");

    return;
  }

  if (department === "") {

    alert("Please select Department");

    return;
  }

  try {

    let response = await fetch(
      "http://localhost:5000/addComplaint",
      {
        method: "POST",

        headers: {
          "Content-Type": "application/json",
        },

        body: JSON.stringify({
          complaintDesc,
          district,
          department,
        }),
      }
    );

    let data = await response.json();

    alert("Complaint Created : " + data.complaintId);

    /* Close Modal */

    let modal =
      bootstrap.Modal.getInstance(
        document.getElementById("complaintModal")
      );

    modal.hide();

    /* Clear Fields */

    document.getElementById("complaintId").value = "";

    document.getElementById("complaintDesc").value = "";

    document.getElementById("district").selectedIndex = 0;

    document.getElementById("department").selectedIndex = 0;

    /* Reload Table */

    loadComplaints();

  } catch(error) {

    console.log(error);

    alert("Error while saving complaint");

  }

}

      async function loadComplaints() {
        let district = document.getElementById("filterDistrict").value;

        let department = document.getElementById("filterDepartment").value;

        let search = document.getElementById("searchComplaint").value;

        let response = await fetch(
          `http://localhost:5000/complaints?district=${district}&department=${department}&search=${search}`,
        );

        let data = await response.json();

        let table = "";

        data.forEach((item, index) => {
          table += `

      <tr>

        <td>${index + 1}</td>

        <td>${item.complaint_id}</td>

        <td>${item.complaint_desc}</td>

        <td>${item.district}</td>

        <td>${item.department}</td>

        <td>${item.status}</td>
        <td>

        <div class="dropdown">

          <button
            class="btn btn-light btn-sm"
            type="button"
            data-bs-toggle="dropdown">

            <i class="bi bi-three-dots-vertical"></i>

          </button>

          <ul class="dropdown-menu">

            <li>

              <button
                class="dropdown-item">

                View History

              </button>

            </li>

          </ul>

        </div>

      </td>

      </tr>

    `;
        });

        document.getElementById("complaintTableBody").innerHTML = table;
   

        
      }

      loadComplaints();
    </script>
    <!-- view history popup model -->
  </body>
</html>
