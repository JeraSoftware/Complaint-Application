<!doctype html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Admin Dashboard</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" href="HomePage.html">
      <img src="img/OIP.webp" alt="Logo" width="40" height="40" class="me-2 rounded-circle" />
      <span>Complaint System</span>
    </a>
    <div class="d-flex ms-auto">
      <a class="btn btn-outline-light btn-sm" href="HomePage.html">Logout</a>
    </div>
  </div>
</nav>

<div class="container mt-4">

  <h2 class="text-center mb-4">

    Admin Dashboard

  </h2>

  <!-- Dashboard Cards -->

  <div class="row">

    <div class="col-md-3">

      <div class="card text-center shadow p-3">

        <h5>Total Complaints</h5>

        <h2 id="totalComplaints">0</h2>

      </div>

    </div>

    <div class="col-md-3">

      <div class="card text-center shadow p-3">

        <h5>Current Month</h5>

        <h2 id="currentMonth">0</h2>

      </div>

    </div>

    <div class="col-md-3">

      <div class="card text-center shadow p-3">

        <h5>Last Month</h5>

        <h2 id="lastMonth">0</h2>

      </div>

    </div>

    <div class="col-md-3">

      <div class="card text-center shadow p-3">

        <h5>Growth %</h5>

        <h2 id="growth">0%</h2>

      </div>

    </div>

  </div>

  <!-- Complaint Table -->

  <div class="card shadow mt-4 p-4">

    <h4 class="mb-3">

      Complaint Records

    </h4>

    <table class="table table-bordered">

      <thead class="table-dark">
<tr>
  <th>Complaint ID</th>
  <th>District</th>
  <th>Department</th>
  <th>Status</th>
  <th>Date</th>
</tr>
</thead>

      <tbody id="complaintTable">

      </tbody>

    </table>

  </div>

  
</div>

<div>
    <h4>Create Department User</h4>

<select id="department">
  <option value="">Select Department</option>
  <option value="Police">Police</option>
  <option value="Transport">Transport</option>
  <option value="Health">Health</option>
</select>

<input
  type="text"
  id="username"
  placeholder="Username">

<input
  type="password"
  id="password"
  placeholder="Password">

<button onclick="createUser()">
  Create User
</button>
</div>




<script>
fetch("http://localhost:5000/adminDashboard")
.then(res => res.json())
.then(data => {

  document.getElementById("totalComplaints").innerText =
    data.totalComplaints;

  document.getElementById("currentMonth").innerText =
    data.currentMonth;

  document.getElementById("lastMonth").innerText =
    data.lastMonth;

  document.getElementById("growth").innerText =
    data.growthPercentage + "%";

  let table =
    document.getElementById("complaintTable");

  table.innerHTML = "";

  data.complaints.forEach(c => {

    table.innerHTML += `

      <tr>

        <td>${c.complaint_id}</td>

        <td>${c.district}</td>

        <td>${c.department}</td>

        <td>${c.status}</td>

        <td>
          ${new Date(c.created_at)
            .toLocaleDateString()}
        </td>

      </tr>

    `;

  });

})
.catch(err => {

  console.log(err);

});



function createUser() {

    let department =
        document.getElementById("department").value;

    let username =
        document.getElementById("username").value.trim();

    let password =
        document.getElementById("password").value.trim();

    if(username === "" || password === ""){

        alert("Please enter Username and Password");

        return;

    }

    fetch("http://localhost:8080/api/departments", {

        method: "POST",

        headers: {
            "Content-Type":"application/json"
        },

        body: JSON.stringify({

            department: department,

            username: username,

            password: password

        })

    })

    .then(res => res.text())

    .then(data => {

        alert(data);

        document.getElementById("username").value = "";

        document.getElementById("password").value = "";

    })

    .catch(err => {

        console.log(err);

        alert("Server Error");

    });

}
</script>

</body>
</html>
